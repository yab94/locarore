[app]
name = "Locarore"
env  = development

[admin]
password = ${ADMIN_PASSWORD}

[database]
host    = mysql
port    = 3306
name    = locarore
user    = locarore
password = ${DB_PASSWORD}
charset = utf8mb4

[upload]
max_size      = 5242880
allowed_types = image/jpeg,image/png,image/webp
upload_path   = /assets/uploads/products
