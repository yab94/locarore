[app]
name = "Locarore"
env  = development

[admin]
password = ${ADMIN_PASSWORD}

[database]
host    = ${DB_HOST}
port    = ${DB_PORT}
name    = ${DB_NAME}
user    = ${DB_USER}
password = ${DB_PASSWORD}
charset = utf8mb4

[upload]
max_size      = 5242880
allowed_types = image/jpeg,image/png,image/webp
upload_path   = /assets/uploads/products

[seo]
products_base_url = /produits
categories_base_url = /categories

[routes]
; ── Site public ──────────────────────────────────────────────────────────────
GET[/]                    = Rore\Presentation\Controller\Site\HomeController.index
GET[/categories/{path+}]  = Rore\Presentation\Controller\Site\CategoryController.show
GET[/produits/{path+}]    = Rore\Presentation\Controller\Site\ProductController.show

; Panier
GET[/panier]              = Rore\Presentation\Controller\Site\CartController.index
POST[/panier/dates]       = Rore\Presentation\Controller\Site\CartController.setDates
POST[/panier/ajouter]     = Rore\Presentation\Controller\Site\CartController.add
POST[/panier/supprimer]   = Rore\Presentation\Controller\Site\CartController.remove
GET[/panier/checkout]     = Rore\Presentation\Controller\Site\CartController.checkout
POST[/panier/checkout]    = Rore\Presentation\Controller\Site\CartController.processCheckout
GET[/panier/confirmation] = Rore\Presentation\Controller\Site\CartController.confirmation

; ── Admin ─────────────────────────────────────────────────────────────────────
; Auth
GET[/admin]              = Rore\Presentation\Controller\Admin\AuthController.login
POST[/admin/connexion]   = Rore\Presentation\Controller\Admin\AuthController.processLogin
POST[/admin/deconnexion] = Rore\Presentation\Controller\Admin\AuthController.logout

; Dashboard
GET[/admin/dashboard] = Rore\Presentation\Controller\Admin\DashboardController.index

; Catégories
GET[/admin/categories]                      = Rore\Presentation\Controller\Admin\CategoryController.index
GET[/admin/categories/creer]                = Rore\Presentation\Controller\Admin\CategoryController.create
POST[/admin/categories/creer]               = Rore\Presentation\Controller\Admin\CategoryController.store
GET[/admin/categories/{id}/modifier]        = Rore\Presentation\Controller\Admin\CategoryController.edit
POST[/admin/categories/{id}/modifier]       = Rore\Presentation\Controller\Admin\CategoryController.update
POST[/admin/categories/{id}/toggle]         = Rore\Presentation\Controller\Admin\CategoryController.toggle

; Produits
GET[/admin/produits]                              = Rore\Presentation\Controller\Admin\ProductController.index
GET[/admin/produits/creer]                        = Rore\Presentation\Controller\Admin\ProductController.create
POST[/admin/produits/creer]                       = Rore\Presentation\Controller\Admin\ProductController.store
GET[/admin/produits/{id}/modifier]                = Rore\Presentation\Controller\Admin\ProductController.edit
POST[/admin/produits/{id}/modifier]               = Rore\Presentation\Controller\Admin\ProductController.update
POST[/admin/produits/{id}/toggle]                 = Rore\Presentation\Controller\Admin\ProductController.toggle
POST[/admin/produits/{id}/photo]                  = Rore\Presentation\Controller\Admin\ProductController.uploadPhoto
POST[/admin/produits/photo/{photoId}/supprimer]   = Rore\Presentation\Controller\Admin\ProductController.deletePhoto

; Packs
GET[/admin/packs]                   = Rore\Presentation\Controller\Admin\PackController.index
GET[/admin/packs/creer]             = Rore\Presentation\Controller\Admin\PackController.create
POST[/admin/packs/creer]            = Rore\Presentation\Controller\Admin\PackController.store
GET[/admin/packs/{id}/modifier]     = Rore\Presentation\Controller\Admin\PackController.edit
POST[/admin/packs/{id}/modifier]    = Rore\Presentation\Controller\Admin\PackController.update
POST[/admin/packs/{id}/toggle]      = Rore\Presentation\Controller\Admin\PackController.toggle

; Réservations
GET[/admin/reservations]                      = Rore\Presentation\Controller\Admin\ReservationController.index
GET[/admin/reservations/calendrier]           = Rore\Presentation\Controller\Admin\ReservationController.calendar
GET[/admin/reservations/{id}]                 = Rore\Presentation\Controller\Admin\ReservationController.show
POST[/admin/reservations/{id}/confirmer]      = Rore\Presentation\Controller\Admin\ReservationController.confirm
POST[/admin/reservations/{id}/devis]          = Rore\Presentation\Controller\Admin\ReservationController.quote
POST[/admin/reservations/{id}/statut]         = Rore\Presentation\Controller\Admin\ReservationController.setStatus
POST[/admin/reservations/{id}/annuler]        = Rore\Presentation\Controller\Admin\ReservationController.cancel

; Contenu & paramètres CMS
GET[/admin/contenu]  = Rore\Presentation\Controller\Admin\SettingsController.index
POST[/admin/contenu] = Rore\Presentation\Controller\Admin\SettingsController.save

; Pages statiques
GET[/mentions-legales] = Rore\Presentation\Controller\Site\LegalController.mentions
