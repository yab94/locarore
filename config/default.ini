[app]
name     = "Locarore"
env      = ${APP_ENV}   
root_dir = @{BASE_PATH}

[php]
display_errors  = Off
error_reporting = 0
include_path    = "@{BASE_PATH}/templates"

[admin]
password = ${ADMIN_PASSWORD}

[database]
host     = ${DB_HOST}
port     = ${DB_PORT}
name     = ${DB_NAME}
user     = ${DB_USER}
password = ${DB_PASSWORD}
charset  = utf8mb4

[upload]
max_size      = 5242880
allowed_types = image/jpeg,image/png,image/webp
upload_path   = /uploads/products

[seo]
site_url            = https://location.latyana-evenements.fr
products_base_url   = /produits
categories_base_url = /categories
tags_base_url       = /tags
packs_base_url      = /packs
force_https         = prod

[smtp]
host        = ${SMTP_HOST}
port        = ${SMTP_PORT}
encryption  = ${SMTP_ENCRYPTION}
user        = ${SMTP_USER}
password    = ${SMTP_PASSWORD}
from_email  = ${SMTP_FROM_EMAIL}
from_name   = ${SMTP_FROM_NAME}

[analytics]
ga_measurement_id = ${GA_MEASUREMENT_ID}
axeptio_client_id  = ${AXEPTIO_CLIENT_ID}
axeptio_version    = ${AXEPTIO_VERSION}

