[app]
name     = "Locarore"
env      = ${APP_ENV}

[php]
display_errors  = Off
error_reporting = 0
include_path    = "@{BASE_PATH}/templates"

[admin]
login_attempts = 10
lockout_seconds = 300
password = ${ADMIN_PASSWORD}
session_key = admin_logged_in

[database]
host     = ${DB_HOST}
port     = ${DB_PORT}
name     = ${DB_NAME}
user     = ${DB_USER}
password = ${DB_PASSWORD}
charset  = utf8mb4

[upload]
base_path     = "@{BASE_PATH}/public"
max_size      = 16777216
allowed_types = image/jpeg,image/png,image/webp,image/bmp,image/gif,image/tiff
upload_path   = /uploads/products
max_width     = 1200
max_height    = 1200

[seo]
site_url            = https://location.latyana-evenements.fr
products_base_url   = /produits
categories_base_url = /categories
tags_base_url       = /tags
packs_base_url      = /packs
force_https         = prod

[smtp]
host        = ${SMTP_HOST}
port        = ${SMTP_PORT}
encryption  = ${SMTP_ENCRYPTION}
user        = ${SMTP_USER}
password    = ${SMTP_PASSWORD}
from_email  = ${SMTP_FROM_EMAIL}
from_name   = ${SMTP_FROM_NAME}

[analytics]
ga_measurement_id = ${GA_MEASUREMENT_ID}

